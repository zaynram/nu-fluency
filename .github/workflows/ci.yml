name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: hustcer/setup-nu@main
        with:
          check-latest: true

      - name: mcp:check
        run: |
          bun install --frozen-lockfile
          bun run mcp:check

  release:
    needs: check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: mcp:build
        run: |
          bun install --frozen-lockfile
          bun mcp:build

      - name: archive
        run: bun pm pack --filename nu-fluency.tgz

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: nu-fluency.tgz
